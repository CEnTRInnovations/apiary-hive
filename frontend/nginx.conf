server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Only used for local `docker compose up` (proxies to the "backend" service by its
    # compose-network name). On DigitalOcean App Platform this block is never reached —
    # the app-level router forwards /api straight to the backend component per .do/app.yaml,
    # so nginx never sees those requests there. Keep it: the frontend calls a same-origin
    # `/api` path (frontend/src/lib/api.ts), so removing this would make local API calls
    # silently fall through to the SPA fallback below instead of failing clearly.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
